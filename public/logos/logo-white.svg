<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none" role="img" aria-label="Arunachal Explore">
  <!-- Mountain icon (white version for dark/transparent backgrounds) -->
  <g transform="translate(4, 6)">
    <!-- Sun rays -->
    <circle cx="24" cy="16" r="5" fill="#FFD580" opacity="0.9"/>
    <line x1="24" y1="7"  x2="24" y2="4"  stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="25" x2="24" y2="28" stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="16" x2="12" y2="16" stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="33" y1="16" x2="36" y2="16" stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="17.6" y1="9.6"  x2="15.4" y2="7.4"  stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="30.4" y1="22.4" x2="32.6" y2="24.6" stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="30.4" y1="9.6"  x2="32.6" y2="7.4"  stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <line x1="17.6" y1="22.4" x2="15.4" y2="24.6" stroke="#FFD580" stroke-width="2" stroke-linecap="round"/>
    <!-- Mountains -->
    <path d="M2 44 L14 24 L20 32 L28 18 L38 44 Z" fill="white" opacity="0.95"/>
    <!-- Snow cap -->
    <path d="M25 22 L28 18 L31 22 Z" fill="#FFD580" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="30" font-family="Georgia, serif" font-size="17" font-weight="700" fill="white" letter-spacing="-0.3">Arunachal</text>
  <text x="56" y="48" font-family="Georgia, serif" font-size="14" font-weight="400" fill="#FFD580" letter-spacing="2.5">EXPLORE</text>
</svg>
