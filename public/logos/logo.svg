<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none" role="img" aria-label="Arunachal Explore">
  <!-- Mountain icon -->
  <g transform="translate(4, 6)">
    <!-- Sun rays -->
    <circle cx="24" cy="16" r="5" fill="#E8A020" opacity="0.9"/>
    <line x1="24" y1="7"  x2="24" y2="4"  stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="25" x2="24" y2="28" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="16" x2="12" y2="16" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="33" y1="16" x2="36" y2="16" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="17.6" y1="9.6"  x2="15.4" y2="7.4"  stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="30.4" y1="22.4" x2="32.6" y2="24.6" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="30.4" y1="9.6"  x2="32.6" y2="7.4"  stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <line x1="17.6" y1="22.4" x2="15.4" y2="24.6" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/>
    <!-- Mountains -->
    <path d="M2 44 L14 24 L20 32 L28 18 L38 44 Z" fill="#1A6B4A" opacity="0.95"/>
    <path d="M2 44 L14 24 L20 32 L28 18 L38 44 Z" fill="url(#mountainGrad)"/>
    <!-- Snow cap -->
    <path d="M25 22 L28 18 L31 22 Z" fill="white" opacity="0.85"/>
  </g>
  <!-- Gradient -->
  <defs>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D8B5F"/>
      <stop offset="100%" stop-color="#1A6B4A"/>
    </linearGradient>
  </defs>
  <!-- Wordmark -->
  <text x="56" y="30" font-family="Georgia, serif" font-size="17" font-weight="700" fill="#1A6B4A" letter-spacing="-0.3">Arunachal</text>
  <text x="56" y="48" font-family="Georgia, serif" font-size="14" font-weight="400" fill="#E8A020" letter-spacing="2.5">EXPLORE</text>
</svg>
